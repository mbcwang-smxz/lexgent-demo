type: 'agent'
name: '民事诉讼 Agent'
version: '2.0.0'
description: '辅助处理民事案件分析与文书起草。'

model_name: 'deepseek/deepseek-chat'

document_types: 'law_agent/types.yaml'

skills:
    # - 'law/skills/s*.yaml'
    - 'law_agent/skills/s*.yaml'

tasks:
    - 'law_agent/tasks/t*.yaml'

functions:
    # - 'law/functions/f*.yaml'
    - 'law_agent/functions/f*.yaml'

analyser_prompt: 'law_agent/prompts/p_analyser.hbs'

init_skill: 'law_agent/skills/s_初始化.yaml'

classify_prompt: 'law_agent/prompts/p_batch_classify.hbs'

default_config: 'law_agent/configs/dev.yaml'

context_prop:
    key: 'caseId'
    path: '/cases/{caseId}/context'

settings:
    timeout: 60000
    context_refresh_strategy: 'per_turn'
