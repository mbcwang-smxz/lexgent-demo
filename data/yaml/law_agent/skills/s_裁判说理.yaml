type: "skill"
id: "Skill_裁判说理"
alias: "s08"
name: "裁判说理生成"
version: "4.1.0"
execution_type: "tasks"
description: |
  匹配适用法律，针对认定事实生成"本院认为"部分的逻辑论述。
  采用多阶段任务：1. 法条检索；2. 逻辑分析；3. 文书撰写。

inputs:
  - name: "source_docs"
    required: true
    description: "事实认定结果。"

outputs:
  - type_ref: "裁判说理"

tasks:
  # 1. 引用外部 task - 法条检索
  - task_ref: "law_agent/tasks/t_法条检索"
    inputs:
      - name: "query"
        ref: "inputs.source_docs"

  # 2. 内联 task - 逻辑分析（使用内联 prompt）
  - id: "逻辑分析"
    prompt: |
      请基于以下事实和法条进行逻辑分析：

      事实认定：
      {{#each inputs.facts}}
      ## {{filename}}
      {{content}}
      {{/each}}

      相关法条：
      {{inputs.laws}}

      请分析：
      1. 事实与法条的对应关系
      2. 法律适用的逻辑推理
      3. 争议焦点的认定理由

      返回 JSON 格式的分析结果。
    inputs:
      - name: "facts"
        ref: "inputs.source_docs"
      - name: "laws"
        ref: "tasks.Task_法条检索.law_result"
    outputs:
      - id: "分析结果"
    llm_config:
      temperature: 0.1

  # 3. 内联 task - 文书撰写（引用外部 prompt 文件）
  - id: "文书撰写"
    prompt_ref: "law_agent/prompts/p_裁判起草.hbs"
    inputs:
      - name: "analysis"
        ref: "tasks.逻辑分析.分析结果"
    outputs:
      - id: "result"
    llm_config:
      temperature: 0.2
    functions:
      - "Func_案件查询"
