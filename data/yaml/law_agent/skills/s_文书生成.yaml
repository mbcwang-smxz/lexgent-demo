type: "skill"
id: "Skill_文书生成"
alias: "s09"
name: "文书自动组装"
version: "4.0.0"
description: |
  将各确认模块（当事人、事实、说理等）组装成完整文书草稿。
  适用场景: 判决书最终生成。
  关键依赖: 当事人信息、诉辩主张、无争议事实、事实认定、裁判说理等分析结果。

inputs:
  - name: "source_docs"
    required: true
    description: "当事人信息、诉辩主张、事实认定、裁判说理等模块。"

outputs:
  - type_ref: "裁判文书草稿"

task:
  prompt_ref: "law_agent/prompts/p_文书生成.hbs"
  llm_config:
    temperature: 0.1
    max_tokens: 8192
