type: "skill"
id: "Skill_争议焦点"
alias: "s04"
name: "争议焦点归纳"
version: "3.0.0"
execution_type: "tasks"
description: |
  基于诉辩双方冲突点及证据情况，自动归纳案件核心争议。
  适用场景: 庭前准备、归纳庭审重点。
  关键依赖: D02诉辩主张、D03证据分析。

inputs:
  - name: "source_docs"
    required: true
    description: "诉辩主张(D02)和证据分析(D03)文档。"

outputs:
  - id: "D04"
    type_ref: "争议焦点"
    filename_template: "D04_争议焦点信息.json"

tasks:
  - id: "归纳"
    prompt_ref: "law_agent/prompts/p_争议焦点.hbs"
    outputs:
      - id: "result"
    llm_config:
      temperature: 0.2
      max_tokens: 4096

  - id: "保存"
    type: api_request
    method: POST
    endpoint: "/cases/{caseId}/files/D04_争议焦点信息.json"
    body:
      id: "D04"
      type_ref: "争议焦点"
    inputs:
      - name: "content"
        ref: "tasks.归纳.result"
