type: "skill"
id: "Skill_事实认定"
alias: "s07"
name: "庭审后事实认定"
version: "4.0.0"
description: |
  结合笔录及全案证据，对争议事实给出倾向性认定意见及置信度。
  适用场景: 庭审后案件分析。
  关键依赖: 庭审笔录、证据分析、事实筛选结果。

inputs:
  - name: "source_docs"
    required: true
    description: "庭审笔录、证据分析、事实筛选结果。"

outputs:
  - type_ref: "事实认定"

task:
  prompt_ref: "law_agent/prompts/p_事实认定.hbs"
  llm_config:
    temperature: 0.1
    max_tokens: 4096
