type: "skill"
id: "Skill_争议焦点"
alias: "s04"
name: "争议焦点归纳"
version: "4.0.0"
description: |
  基于诉辩双方冲突点及证据情况，自动归纳案件核心争议。
  适用场景: 庭前准备、归纳庭审重点。
  关键依赖: 诉辩主张、证据分析。

inputs:
  - name: "source_docs"
    required: true
    description: "诉辩主张和证据分析文档。"

outputs:
  - type_ref: "争议焦点"

task:
  prompt_ref: "lexgent/prompts/p_争议焦点.hbs"
  llm_config:
    temperature: 0.2
    max_tokens: 4096
