type: "skill"
id: "Skill_法律问答"
alias: "s10"
name: "法律问答"
version: "2.0.0"
description: |
  回答用户的法律问题，支持工具调用检索法条。

inputs:
  - name: "question"
    type: "string"
    required: true
    primary: true
    description: "用户的法律问题"

# 单任务：内联 prompt + 工具调用
task:
  prompt: |
    你是一位专业的法律顾问。请回答以下法律问题：

    问题：{{inputs.question}}

    请：
    1. 如需查询具体法条，使用 Func_法条检索 工具
    2. 给出清晰、专业、面向用户的自然语言回答
    3. 引用相关法律依据时，列出具体条文名称和内容摘要

    输出格式：直接用 Markdown 格式回答用户，不要返回 JSON。
    - 先给出结论性回答
    - 再逐条列出相关法律依据（法律名称、条款号、内容要点）
    - 最后给出简要的实务建议或注意事项

  functions:
    - "Func_法条检索"

  llm_config:
    temperature: 0.3
    max_turns: 5
