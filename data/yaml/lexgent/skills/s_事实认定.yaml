type: 'skill'
id: 'Skill_事实认定'
alias: 's07'
name: '庭审后事实认定'
version: '3.0.0'
execution_type: 'tasks'
description: |
    结合笔录及全案证据，对争议事实给出倾向性认定意见及置信度。
    适用场景: 庭审后案件分析。
    关键依赖: 庭审笔录(R07)、证据分析(D03)、事实筛选(D05/D10)。

inputs:
    - name: 'source_docs'
      required: true
      description: '庭审笔录、证据分析、事实筛选结果。'

outputs:
    - id: 'D07'
      type_ref: '事实认定'
      filename_template: 'D07_事实认定分析.json'

tasks:
    - id: '认定'
      prompt_ref: 'lexgent/prompts/p_事实认定.hbs'
      outputs:
          - id: 'result'
      llm_config:
          temperature: 0.1
          max_tokens: 4096

    - id: '保存'
      type: api_request
      method: POST
      endpoint: '/cases/{caseId}/files/D07_事实认定分析.json'
      body:
          id: 'D07'
          type_ref: '事实认定'
      inputs:
          - name: 'content'
            ref: 'tasks.认定.result'
