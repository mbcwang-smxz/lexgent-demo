type: 'skill'
id: 'Skill_庭审提纲'
alias: 's06'
name: '庭审提纲生成'
version: '3.0.0'
execution_type: 'tasks'
description: |
    基于争议焦点及有争议事实，为法官生成庭审发问提纲。
    适用场景: 开庭前准备。
    关键依赖: D04争议焦点、D10有争议事实。

inputs:
    - name: 'source_docs'
      required: true
      description: '争议焦点(D04)、有争议事实(D10)、证据分析(D03)。'

outputs:
    - id: 'D06'
      type_ref: '庭审提纲'
      filename_template: 'D06_庭审提纲.json'

tasks:
    - id: '生成'
      prompt_ref: 'lexgent/prompts/p_庭审提纲.hbs'
      outputs:
          - id: 'result'
      llm_config:
          temperature: 0.2
          max_tokens: 4096

    - id: '保存'
      type: api_request
      method: POST
      endpoint: '/cases/{caseId}/files/D06_庭审提纲.json'
      body:
          id: 'D06'
          type_ref: '庭审提纲'
      inputs:
          - name: 'content'
            ref: 'tasks.生成.result'
