type: 'skill'
id: 'Skill_文件转换'
alias: 's11'
name: '文件格式转换'
version: '4.0.0'
description: |
    将PDF或Word文件（P## 系列）转换为Markdown格式。
    转换后的文件注册为 U## 未分类文档，等待后续分类。
    此技能自动注入所有待转换文档，无需指定 inputs。

inputs:
    - name: 'pending_files'
      system: 'files_by_type'
      filter: '待转换文档'
      required: false
      description: "类型为'待转换文档'的文件列表（自动注入，无需指定）"

task:
    prompt_ref: 'lexgent/prompts/p_文件转换'
    functions:
        - 'Func_文件转换'
    llm_config:
        temperature: 0.1
        max_turns: 10
